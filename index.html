<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love ❤️</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:20px;
}

.box{
    max-width:700px;
    margin:auto;
}

#content{
    display:none;
}

input{
    padding:10px;
    border-radius:10px;
    border:none;
    width:220px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

img{
    width:100%;
    border-radius:15px;
    margin-top:15px;
}

a{
    color:#ffb6c1;
    font-size:20px;
    text-decoration:none;
}

.final{
    margin-top:30px;
    font-size:22px;
}
</style>
</head>

<body>

<div id="login">

<h2>🔒 أدخل كلمة السر</h2>

<input type="password" id="pass">

<br><br>

<button onclick="checkPass()">دخول</button>

</div>

<div id="content" class="box">

<h1>Love ❤️</h1>

<h2 id="counter"></h2>

<p>
منذ 9 / 4 / 2025 ❤️
</p>

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">

<h2>💌 رسالة</h2>

<p>
انا فعلا بحبك و مقدرش استغنى عنك انت كل حياتي و مش مستعده اضيعك من ايدي مهما كان السبب و هسعي لحد ما نبقى زي الاول و احسن كمان بعشقك ❤️❤️❤️
</p>

<br>

<a href="https://lnk.to/ahla-w-ahla" target="_blank">
🎵 أغنيتنا
</a>

<div class="final">

<p>
🎀 دايما مع بعض 🎀
</p>

<p>
إنما عَينيكَ، بحَرٌ لامِع، وأني فِي بحَرِ عَينيكَ مُغرم.
</p>

</div>

</div>

<script>

function checkPass(){

if(document.getElementById("pass").value==="Me before you"){

document.getElementById("login").style.display="none";

document.getElementById("content").style.display="block";

}else{

alert("كلمة السر غير صحيحة");

}

}

const startDate = new Date("2025-04-09T00:00:00");

function updateCounter(){

const now = new Date();
const diff = now - startDate;

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
const seconds = Math.floor((diff%(1000*60))/1000);

document.getElementById("counter").innerHTML =
"❤️ مر " + days + " يوم و " + hours + " ساعة و " + minutes + " دقيقة و " + seconds + " ثانية ❤️";

}

setInterval(updateCounter,1000);

updateCounter();

</script>

</body>
</html>
