<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:20px;
    background: linear-gradient(135deg, #1a1a1a, #2b1b2f, #111);
    color:white;
}

/* قلوب */
.heart{
    position:fixed;
    top:-10px;
    color:#ff7aa2;
    animation:fall linear infinite;
    font-size:18px;
    opacity:0.6;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}

/* تسجيل الدخول */
#login{
    margin-top:120px;
}

.glass{
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius:20px;
    padding:30px;
    display:inline-block;
}

input{
    padding:12px;
    border-radius:10px;
    border:none;
    width:220px;
    outline:none;
    margin-top:10px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
    background:#ff5fa2;
    color:white;
}

/* المحتوى */
#content{
    display:none;
    max-width:850px;
    margin:auto;
}

/* الصور */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:10px;
    margin-top:15px;
}

img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:15px;
}

/* عداد */
#counter{
    color:#ffb6c1;
    margin:15px 0;
    font-size:18px;
}

/* رسالة */
p{
    line-height:1.8;
}
</style>
</head>

<body>

<!-- قلوب -->
<script>
for(let i=0;i<20;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💗";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(h);
}
</script>

<div id="login">
    <div class="glass">
        <h2>🔒 أدخل كلمة السر</h2>
        <input type="password" id="pass">
        <br>
        <button onclick="checkPass()">دخول</button>
    </div>
</div>

<div id="content">

<h1>Love ❤️</h1>

<h2 id="counter"></h2>

<p>منذ 9 / 4 / 2025 ❤️</p>

<!-- صور رومانسية -->
<div class="gallery">

<img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=600&q=60">
<img src="https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?auto=format&fit=crop&w=600&q=60">
<img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?auto=format&fit=crop&w=600&q=60">
<img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=600&q=60">

</div>

<h2>💌 رسالة</h2>

<p>
انا فعلا بحبك و مقدرش استغنى عنك انت كل حياتي و مش مستعده اضيعك من ايدي مهما كان السبب و هسعي لحد ما نبقى زي الاول و احسن كمان بعشقك ❤️❤️❤️
</p>

<a href="https://lnk.to/ahla-w-ahla" target="_blank">🎵 أغنيتنا</a>

<div style="margin-top:30px;">
<p>🎀 دايما مع بعض 🎀</p>
<p>إنما عَينيكَ، بحَرٌ لامِع، وأني فِي بحَرِ عَينيكَ مُغرم.</p>
</div>

</div>

<script>

function checkPass(){
if(document.getElementById("pass").value.trim() === "Me before you"){
    document.getElementById("login").style.display="none";
    document.getElementById("content").style.display="block";
}else{
    alert("كلمة السر غير صحيحة");
}
}

const startDate = new Date("2025-04-09T00:00:00");

function updateCounter(){
const now = new Date();
const diff = now - startDate;

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
const seconds = Math.floor((diff%(1000*60))/1000);

document.getElementById("counter").innerHTML =
"❤️ مر " + days + " يوم و " + hours + " ساعة و " + minutes + " دقيقة و " + seconds + " ثانية ❤️";
}

setInterval(updateCounter,1000);
updateCounter();

</script>

</body>
</html>
